<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senda do Herói - Hidratação</title>
    <link rel="stylesheet" href="hidratacao.css">
</head>
<body>

    <div class="canvas">
        <header>
            <h1>🌊 Centro de Vitalidade</h1>
            <p>Recupere. Recarregue. Retorne mais forte.</p>
        </header>

        <div class="status-container">
            <div class="meta-info">
                <span>Meta Diária: <strong id="meta-valor">4.0</strong> Litros</span>
            </div>
            
            <div class="calice-exterior">
                <div id="agua-nivel" class="agua-interior"></div>
                <div class="reflexo"></div>
            </div>

            <h2 id="porcentagem">0%</h2>
        </div>

        <div class="controles">
            <button class="btn-agua" onclick="adicionarAgua(250)">
                <span>+250ml</span>
                <small>Cálice de Prata</small>
            </button>
            <button class="btn-agua" onclick="adicionarAgua(500)">
                <span>+500ml</span>
                <small>Ânfora de Ouro</small>
            </button>
        </div>

        <button id="btn-reset" onclick="resetarFonte()">Limpar Altar para Amanhã</button>
    </div>

    <script src="hidratacao.js"></script>
</body>
</html>
